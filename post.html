<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="post.css">
    <title>Document</title>
</head>
<body>
    
    <header>
        <div class="logo">
            <h1>IknowLagos</h1>
        </div>
        <div class="input">
            <a href="#" class="redit-logo">
                <i class="fa-brands fa-reddit-alien"></i>
            </a>
            <input type="text">
            <a href="#" class="icons">
                <i class="fa-brands fa-app-store"></i>
                <p>Ask</p>
            </a>
        </div>
        <div class="header_links">
            <a href="#" class="icons">
                <i class="fa-brands fa-square-behance"></i>
            </a>
            <a href="#" class="icons">
                <i class="fa-regular fa-comment-dots"></i>
            </a>
            <a href="#" class="icons">
                <i class="fa-solid fa-square-plus"></i>
                <p>Create</p>
            </a>
            <a href="#">
                <i class="fa-light fa-bell"></i>
            </a>
            <a href="#" class="icons">
                <i class="fa-brands fa-square-reddit"></i>
            </a>
        </div>
    </header>

    <section class="main">
        <div class="sidebar">
            <nav>
                <a href="feeds.html" class="home active">
                    <i class="fa-regular fa-house"></i>
                    <p>Home</p>
                </a>
                <a href="#" class="popular">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    <p>Discover</p>
                </a>
                <a href="#" class="news">
                    <i class="fa-regular fa-newspaper"></i>
                    <p>Events</p>
                </a>
                <a href="#" class="Explore">
                    <i class="fa-regular fa-compass"></i>
                    <p>Places</p>
                </a>
                <a href="post.html" class="Explore">
                    <i class="fa-solid fa-plus"></i>                    
                    <p>Create</p>
                </a>
                <a href="#" class="Explore">
                    <i class="fa-regular fa-compass"></i>
                    <p>Profile</p>
                </a>
            </nav>
        </div>
        <div class="create-post">
            <h2>Create post</h2>
            <button class="select-community">
                <a href="#">
                    <p>Select a community</p>
                    <i class="fa-solid fa-angle-down"></i>
                </a>
            </button>
            <div class="post-type">
                <p>Text</p>
                <p>Images & Video</p>
                <p>Link</p>
                <p>Poll</p>
            </div>
            <div class="post-title">
                <input type="text" placeholder="title">
                <p>0/300</p>
            </div>
            <div class="post-body">
                <button>Add tags</button>
                <textarea placeholder="Body text (optional)"></textarea>
                <div class="actions-post-btns">
                    <button>Save Draft</button>
                    <button>Post</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
