<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* list-style: none; */
            text-decoration: none;
            user-select: none;
        }
        :root{
            --bg-color: hsl(0, 0%, 0%);
            --light-grey: hsl(0,0%, 15%);
            --border: rgba(255, 255, 255, 0.2);
        }
        h1{
            font-size: 25px;
        }
        i{
            font-size: 20px;
        }
        p{
            color: hsl(0,0%,90%);
        }
        a{
            color: white;
            display: flex;
            align-items: center;
            justify-self: center;
            gap: .5rem;
        }
        button{
            background-color: transparent;
            border: none;
            padding: 10px 15px;
            border-radius: 60px;
        }
        button:hover{
            background-color: var(--light-grey);
        }
        img{
            width: 100%;
            border-radius: 20px;
            margin: 10px 0;
        }



        body{
            color: white;
            background-color: var(--bg-color);
            height: 100vh;
        }
        header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
        }
        .header_links{
            display: flex;
            /* gap: 1rem; */
        }
        .input{
            border: 1px solid var(--border);
            border: 2px solid purple;
            border-radius: 60px;
            width: 40%;
            display: flex;
            align-items: center;
            gap: .5rem;
            justify-content: center;
            padding: 0 10px;
            box-shadow: 0 0 20px rgba(128, 0, 128, .5);
        }
        input{
            width: 100%;
            padding: 5px 10px;
            background-color: transparent;
            border: none;
            border-right: 1px solid var(--border);
            color: white;
            font-size: 16px;
            outline: none;
        }
        .redit-logo{
            background-color: purple;
            padding: 5px;
            border-radius: 30px;
        }
        .icons{
            padding: 10px;
            border-radius: 40px;
        }
        .icons:hover{
            background-color: var(--light-grey);
        }

        /* -------------- nav bars --------------- */
        section.main{
            display: grid;
            grid-template-columns: 20% 1fr 25%;
            height: 100%;
        }
        .sidebar{
            border-right: 1px solid var(--border);
            padding: 10px 15px;
            height: 100%;
        }
        .sidebar nav{
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .sidebar a{
            display: flex;
            align-items: center;
            justify-self: center;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
        }
        .sidebar a.active{
            background-color: hsl(0,0%,20%);
        }
        .sidebar a:hover{
            background-color: hsl(0,0%,10% );
        }

        .feeds{
            padding: 0 15px ;
        }
        .feeds-header{
            border-bottom: 1px solid var(--border);
            padding: 5px 0;
        }
        .feeds-header i{
            font-size: 14px;
        }
        .feed-container{
            border-bottom: 1px solid var(--border);
        }
        .feed{
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .feed h2{
            color: hsl(0, 0%, 90%);
        }
        .feed:hover{
            background-color: hsl(0,0%,10%);
        }
        .feed-head{
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .feed-head button{
            padding: 10px;
            color: white;
        }
        .feed-head button:first-child{
            background-color: blue;
            color: white;
            padding: 5px 20px;
        }
        .feed-head-main{
            display: flex;
            align-self: center;
            justify-self: center;
            gap: .5rem;
        }
        .feed-reviews{
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .feed-reviews button{
            background-color: var(--light-grey);
            display: flex;
            align-items: center;
            justify-self: center;
            color: white;
        }

    </style>
</head>
<body>
    
    <header>
        <div class="logo">
            <h1>IknowLagos</h1>
        </div>
        <div class="input">
            <a href="#" class="redit-logo">
                <i class="fa-brands fa-reddit-alien"></i>
            </a>
            <input type="text">
            <a href="#" class="icons">
                <i class="fa-brands fa-app-store"></i>
                <p>Ask</p>
            </a>
        </div>
        <div class="header_links">
            <a href="#" class="icons">
                <i class="fa-brands fa-square-behance"></i>
            </a>
            <a href="#" class="icons">
                <i class="fa-regular fa-comment-dots"></i>
            </a>
            <a href="post.html" class="icons">
                <i class="fa-solid fa-square-plus"></i>
                <p>Create</p>
            </a>
            <a href="#">
                <i class="fa-light fa-bell"></i>
            </a>
            <a href="#" class="icons">
                <i class="fa-brands fa-square-reddit"></i>
            </a>
        </div>
    </header>

    <section class="main">
        <div class="sidebar">
            <nav>
                <a href="feeds.html" class="home active">
                    <i class="fa-regular fa-house"></i>
                    <p>Home</p>
                </a>
                <a href="#" class="popular">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    <p>Discover</p>
                </a>
                <a href="#" class="news">
                    <i class="fa-regular fa-newspaper"></i>
                    <p>Events</p>
                </a>
                <a href="#" class="Explore">
                    <i class="fa-regular fa-compass"></i>
                    <p>Places</p>
                </a>
                <a href="post.html" class="Explore">
                    <i class="fa-solid fa-plus"></i>                    
                    <p>Create</p>
                </a>
                <a href="#" class="Explore">
                    <i class="fa-regular fa-compass"></i>
                    <p>Profile</p>
                </a>
            </nav>
        </div>
        <div class="feeds">
            <div class="feeds-header">
                <button>
                    <a href="#">
                        <p>Best</p>
                        <i class="fa-solid fa-angle-down"></i>
                    </a>
                </button>
                <button>
                    <a href="#">
                        <i class="fa-solid fa-server"></i>
                        <i class="fa-solid fa-angle-down"></i>
                    </a>
                </button>
            </div>
            <div class="feeds-body">
                <div class="feed-container">
                    <div class="feed">
                        <div class="feed-head">
                            <div class="feed-head-main">
                                <!-- <img src="" alt=""> -->
                                <small>r/micro/saas</small>
                                <small>12hr. ago</small>
                                <small>Becuase you've shown interest in a similar community</small>
                            </div>
                            <aside>
                                <button>Join</button>
                                <button class="more">
                                    <i class="fa-solid fa-ellipsis"></i>
                                </button>
                            </aside>
                        </div>
                        <div class="feed-body">
                            <h2 class="feed-title">1 Month after launching my SaaS: $1k revenue, 50 paying customer, 2000 signups. Here's what worked</h2>
                            <div class="feed-image">
                                <img src="feed-image.png" alt="">
                            </div>
                            <div class="feed-reviews">
                                <button>
                                    <i class="fa-solid fa-arrow-up"></i>
                                    <p>44</p>
                                    <i class="fa-solid fa-arrow-down"></i>
                                </button>
                                <button class="comments">
                                    <i class="fa-regular fa-comment"></i>
                                    <p>24</p>
                                </button>
                                <button class="badges">
                                    <i class="fa-solid fa-award"></i>
                                </button>
                                <button class="share">
                                    <p>Share</p>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="communinty"></div>
    </section>
</body>
</html>
